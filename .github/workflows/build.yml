# Automatically build all three projects for every push and pull request.
name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build --warning-mode all
      - name: capture project artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: |
            common/build/libs/
            fabric/build/libs/
            neoforge/build/libs/
