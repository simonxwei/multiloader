plugins {
    id 'multiloader-common'
    id 'net.neoforged.moddev'
}

sourceSets.main.resources {
    // Include resources generated by common data generators.
    srcDir('src/generated/resources')
}

neoForge {
    // ModDevGradle vanilla mode gives the common project access to Minecraft
    // without adding Fabric- or NeoForge-specific APIs.
    neoFormVersion = project.neo_form_version

    // Apply the shared Access Transformer while compiling common sources.
    accessTransformers.from(file('src/main/resources/META-INF/accesstransformer.cfg'))
}

// Export raw common Java sources for the two loader projects. This is the
// multiloader-specific part; common itself remains independently compilable.
def commonJava = configurations.create('commonJava') {
    canBeDeclared = false
    canBeResolved = false
    canBeConsumed = true
}

artifacts.add(commonJava.name, file('src/main/java'))

// Implement the loader attribute convention used by multiloader tooling.
// See https://github.com/mcgradleconventions.
def loaderAttribute = Attribute.of('io.github.mcgradleconventions.loader', String)

['apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements'].each { configurationName ->
    configurations.named(configurationName) {
        attributes {
            attribute(loaderAttribute, 'common')
        }
    }
}

sourceSets.configureEach { sourceSet ->
    [sourceSet.compileClasspathConfigurationName, sourceSet.runtimeClasspathConfigurationName].each { configurationName ->
        configurations.named(configurationName) {
            attributes {
                attribute(loaderAttribute, 'common')
            }
        }
    }
}
